name: Deployment pipeline

on:
  push:
    branches:
      - main

jobs:
  simple_deployment_pipeline:    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: '24'
      - name: change directory to Part 11 fs-pokedex-main
        run: cd 'fs-pokedex-main'
      - name: Install dependencies        
        run: npm install
      - name: Check style        
        run: npm run eslint
