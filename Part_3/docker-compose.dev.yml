services:
  app:
    image: phonebook-frontend-dev
    volumes:
      - ./phonebook:/usr/src/app # The path can be relative, so ./ is enough to say "the same location as the docker-compose.yml"
      #- /usr/src/app/node_modules # keep image-installed node_modules (anonymous volume)
    environment:
      - VITE_BACKEND_URL=/api
    container_name: phonebook-frontend-dev # This will name the container phonebook-frontend-dev
    depends_on:
      - app-backend # wait for the backend container to be started
  debug-helper:
    image: busybox
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - app # wait for the frontend container to be started
  app-backend:
    image: phonebook_backend-dev
    environment:
      - MONGO_URL=mongodb://the_username:the_password@mongo:27017/the_database
    volumes:
      - ./phonebook_backend:/usr/src/app
      #- /usr/src/app/node_modules 
    container_name: phonebook_backend-dev # This will name the container phonebook_backend-dev
    depends_on:
      mongo:
        condition: service_started # wait for the mongo container to be started
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database
    volumes:
      - ./phonebook_backend/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - ./mongo_data:/data/db
  