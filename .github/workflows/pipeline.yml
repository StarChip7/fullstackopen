name: Deployment pipeline

on:
  push:
    branches:
      - main

jobs:
  simple_deployment_pipeline:    
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Part_11/fs-pokedex-main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: '24'
      - name: Install dependencies        
        run: npm install
      - name: Check style        
        run: npm run eslint
      - name: npm run test
        run: npm run test
      - name: build
        run: npm run build
